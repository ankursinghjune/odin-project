<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe</title>
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="container">
            <h1>Tic Tac Toe</h1>
            <form>
                <label for="player1">Player 1 (X)</label>
                <input type="text" id="player1" placeholder="Enter name" />
                <label for="player1">Player 2 (O)</label>
                <input type="text" id="player2" placeholder="Enter name" />
                <button class="start-game">Start</button>
                <button class="restart-game">Restart</button>
            </form>
            <h3>Winner:</h3>
            <div class="gameboard">
                <table>
                    <tbody>
                        <tr>
                            <td data-index="0"></td>
                            <td data-index="1"></td>
                            <td data-index="2"></td>
                        </tr>
                        <tr>
                            <td data-index="3"></td>
                            <td data-index="4"></td>
                            <td data-index="5"></td>
                        </tr>
                        <tr>
                            <td data-index="6"></td>
                            <td data-index="7"></td>
                            <td data-index="8"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
