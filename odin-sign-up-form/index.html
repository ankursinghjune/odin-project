<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign-up Form</title>
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="container">
            <!-- sidebar content -->
            <div class="sidebar">
                <div class="logo">
                    <img src="images/odin-lined.png" alt="odin-logo" />ODIN
                </div>
                <footer class="footer">
                    Photo by
                    <a href="https://unsplash.com/@haliewestphoto"
                        >Halie West</a
                    >
                    on
                    <a href="https://unsplash.com/">Unsplash</a>
                </footer>
            </div>
            <!-- main content -->
            <div class="main">
                <!-- form -->
                <form>
                    <h1 class="heading">
                        This is not a real online service! You know you need
                        something<br />like this in your life to help you
                        realize your deepest dreams.<br />
                        Sign up <a href="#">now</a> to get started.
                    </h1>
                    <h1 class="subheading">
                        You <a href="#">know</a> you want to.
                    </h1>
                    <h1 class="form-heading">Let's do this!</h1>

                    <div class="form-row">
                        <div class="field">
                            <label for="first-name">FIRST NAME</label>
                            <input
                                type="text"
                                id="first-name"
                                name="first-name"
                            />
                        </div>
                        <div class="field">
                            <label for="last-name">LAST NAME</label>
                            <input
                                type="text"
                                id="last-name"
                                name="last-name"
                            />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="field">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" />
                        </div>
                        <div class="field">
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" id="phone" name="phone" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="field">
                            <label for="password">PASSWORD</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                            />
                        </div>
                        <div class="field">
                            <label for="confirm-password"
                                >CONFIRM PASSWORD</label
                            >
                            <input
                                type="password"
                                id="confirm-password"
                                name="confirm-password"
                            />
                        </div>
                    </div>

                    <button type="submit">Create Account</button>
                    <p class="log-in">
                        Already have an account? <a href="#">Log in</a>
                    </p>
                </form>
            </div>
        </div>
    </body>
</html>
